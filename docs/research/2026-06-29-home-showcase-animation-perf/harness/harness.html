<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>dotUI home-animation perf harness</title>
<style>
  /* ----- Theme tokens (mirror dotUI's scoped vars) ----- */
  :root {
    --bg: #0a0a0a; --fg: #fafafa; --muted-fg: #a1a1aa;
    --card: #141414; --border: #262626;
    --primary: #6366f1; --primary-fg: #ffffff;
    --accent: #1f2937;
    --radius-factor: 1;
    /* density-driven *layout* vars (stand in for tv className swaps p-2 -> p-4) */
    --pad: 16px; --gap: 12px; --fs: 14px; --lh: 20px; --ctl-h: 36px; --btn-px: 14px; --btn-py: 8px;
  }
  .density-compact     { --pad: 10px; --gap: 8px;  --fs: 12.5px; --lh: 17px; --ctl-h: 30px; --btn-px: 10px; --btn-py: 5px; }
  .density-default     { --pad: 16px; --gap: 12px; --fs: 14px;   --lh: 20px; --ctl-h: 36px; --btn-px: 14px; --btn-py: 8px; }
  .density-comfortable { --pad: 22px; --gap: 16px; --fs: 15.5px; --lh: 24px; --ctl-h: 44px; --btn-px: 18px; --btn-py: 11px; }

  * { box-sizing: border-box; }
  body { margin: 0; background: var(--bg); color: var(--fg); font: 14px/1.4 ui-sans-serif, system-ui, sans-serif; }

  /* The themed subtree under test. */
  .grid {
    columns: 3;                 /* CSS multi-column masonry — same as the real grid */
    column-gap: var(--gap);
    padding: 24px;
    width: 1400px;              /* realistic landing grid width */
  }
  .card {
    break-inside: avoid;
    margin-bottom: var(--gap);
    background: var(--card);
    color: var(--fg);
    border: 1px solid var(--border);
    border-radius: calc(14px * var(--radius-factor));
    box-shadow: 0 1px 2px rgba(0,0,0,.4), 0 8px 24px -12px rgba(0,0,0,.5);
    padding: var(--pad);
    font-size: var(--fs);
    line-height: var(--lh);
  }
  .card h3 { margin: 0 0 var(--gap); font-size: calc(var(--fs) + 2px); line-height: var(--lh); }
  .row { display: flex; align-items: center; gap: var(--gap); margin-bottom: var(--gap); }
  .dot { width: var(--ctl-h); height: var(--ctl-h); border-radius: 9999px; background: var(--accent); flex: none; }
  .line { height: var(--fs); border-radius: calc(6px * var(--radius-factor)); background: var(--accent); flex: 1; }
  .line.short { width: 40%; flex: none; }
  .input {
    height: var(--ctl-h); border: 1px solid var(--border); border-radius: calc(8px * var(--radius-factor));
    background: var(--bg); margin-bottom: var(--gap); padding: 0 var(--btn-px);
  }
  .btn {
    display: inline-flex; align-items: center; gap: 6px;
    height: var(--ctl-h); padding: var(--btn-py) var(--btn-px);
    border-radius: calc(8px * var(--radius-factor));
    background: var(--primary); color: var(--primary-fg); border: 0;
    box-shadow: 0 1px 2px rgba(0,0,0,.4), inset 0 1px 0 rgba(255,255,255,.08);
    font-size: var(--fs);
  }
  .btn.ghost { background: transparent; color: var(--fg); border: 1px solid var(--border); box-shadow: none; }
  .icon { width: var(--fs); height: var(--fs); }
  .icon path, .icon circle, .icon rect { stroke: var(--muted-fg); fill: none; }
  .swatch { width: var(--ctl-h); height: var(--ctl-h); border-radius: calc(8px * var(--radius-factor)); background: var(--primary); }
  .footer { display: flex; gap: var(--gap); justify-content: flex-end; margin-top: var(--gap); }
  .muted { color: var(--muted-fg); }

  /* ================= TRANSITION RULES (toggled by data-mode) ================= */
  /* CURRENT (PR #302): 16 props including layout-inducing ones, on every node. */
  [data-mode="current"][data-anim] *,
  [data-mode="current"][data-anim] {
    transition-property:
      color, background-color, border-color, outline-color, text-decoration-color,
      fill, stroke, box-shadow, padding, gap, width, height, min-height,
      font-size, line-height, border-radius;
    transition-duration: 500ms;
    transition-timing-function: cubic-bezier(0.4, 0, 0.2, 1);
  }
  /* NEW (paint-only): zero layout-inducing props. */
  [data-mode="paint"][data-anim] *,
  [data-mode="paint"][data-anim] {
    transition-property:
      color, background-color, border-color, outline-color, text-decoration-color,
      fill, stroke, box-shadow, border-radius;
    transition-duration: 450ms;
    transition-timing-function: cubic-bezier(0.4, 0, 0.2, 1);
  }
  /* NEW-B (paint, no box-shadow): shadows snap, everything else (incl. radius) tweens. */
  [data-mode="paint-nsh"][data-anim] *,
  [data-mode="paint-nsh"][data-anim] {
    transition-property:
      color, background-color, border-color, outline-color, text-decoration-color,
      fill, stroke, border-radius;
    transition-duration: 450ms;
    transition-timing-function: cubic-bezier(0.4, 0, 0.2, 1);
  }
  /* NEW-C (color only): no shadow, no radius — the cheapest possible crossfade. */
  [data-mode="paint-col"][data-anim] *,
  [data-mode="paint-col"][data-anim] {
    transition-property:
      color, background-color, border-color, outline-color, text-decoration-color,
      fill, stroke;
    transition-duration: 450ms;
    transition-timing-function: cubic-bezier(0.4, 0, 0.2, 1);
  }
</style>
</head>
<body>
<div id="root"></div>

<script>
const ICON = `<svg class="icon" viewBox="0 0 24 24"><circle cx="12" cy="12" r="9" stroke-width="2"/><path d="M8 12l3 3 5-6" stroke-width="2"/></svg>`;

// Build one realistic card (~18-22 DOM nodes) in a few shapes.
function card(kind, i) {
  const head = `<h3>Card ${kind} ${i} ${ICON}</h3>`;
  if (kind === 'form') return `<div class="card">${head}
    <div class="muted line short"></div><div class="input"></div>
    <div class="muted line short"></div><div class="input"></div>
    <div class="footer"><button class="btn ghost">Cancel ${ICON}</button><button class="btn">Save ${ICON}</button></div></div>`;
  if (kind === 'list') return `<div class="card">${head}
    ${[0,1,2,3].map(()=>`<div class="row"><div class="dot"></div><div class="line"></div><div class="line short"></div><button class="btn ghost">${ICON}</button></div>`).join('')}</div>`;
  if (kind === 'stat') return `<div class="card">${head}
    <div class="row"><div class="swatch"></div><div><div class="line short"></div><div class="muted line short"></div></div></div>
    <div class="line"></div><div class="line"></div><div class="line short"></div>
    <div class="footer"><button class="btn">Action ${ICON}</button></div></div>`;
  return `<div class="card">${head}
    <div class="line"></div><div class="line"></div><div class="line"></div><div class="line short"></div>
    <div class="row"><button class="btn">Primary ${ICON}</button><button class="btn ghost">Ghost</button></div></div>`;
}

const KINDS = ['form','list','stat','text'];
function buildGrid(n) {
  let html = '';
  for (let i = 0; i < n; i++) html += card(KINDS[i % KINDS.length], i);
  return html;
}

// Mount the themed subtree. n cards -> count nodes after.
const root = document.getElementById('root');
const grid = document.createElement('div');
grid.className = 'grid density-default';
grid.id = 'grid';
grid.innerHTML = buildGrid(60);
root.appendChild(grid);
const NODE_COUNT = grid.querySelectorAll('*').length;

// ----- Palettes & radii to cycle (paint axes) -----
const PALETTES = [
  { '--primary':'#6366f1','--primary-fg':'#fff','--card':'#141414','--border':'#262626','--accent':'#1f2937','--bg':'#0a0a0a','--fg':'#fafafa','--muted-fg':'#a1a1aa' },
  { '--primary':'#f5f5f5','--primary-fg':'#0a0a0a','--card':'#0f0f0f','--border':'#222','--accent':'#171717','--bg':'#000','--fg':'#ededed','--muted-fg':'#888' },
  { '--primary':'#22c55e','--primary-fg':'#04130a','--card':'#0d1410','--border':'#1c2b22','--accent':'#13251b','--bg':'#070b08','--fg':'#eafff2','--muted-fg':'#7fb79a' },
  { '--primary':'#e7b008','--primary-fg':'#1a1300','--card':'#16130c','--border':'#2c2616','--accent':'#241f10','--bg':'#0c0a05','--fg':'#fff6e0','--muted-fg':'#c0a86a' },
  { '--primary':'#ec4899','--primary-fg':'#2a0716','--card':'#160d12','--border':'#2c1822','--accent':'#241019','--bg':'#0c060a','--fg':'#ffe9f4','--muted-fg':'#c07f9f' },
];
const RADII = ['1','0.4','1.5','0.7','1.15'];
const DENSITIES = ['density-compact','density-default','density-comfortable'];

function applyTheme(i, withDensity) {
  const pal = PALETTES[i % PALETTES.length];
  for (const k in pal) grid.style.setProperty(k, pal[k]);
  grid.style.setProperty('--radius-factor', RADII[i % RADII.length]);
  if (withDensity) {
    grid.classList.remove('density-compact','density-default','density-comfortable');
    grid.classList.add(DENSITIES[i % DENSITIES.length]);
  }
}

// ----- Long-task observer (main-thread blocking) -----
let longTasks = [];
try {
  new PerformanceObserver((list) => { for (const e of list.getEntries()) longTasks.push(e); })
    .observe({ entryTypes: ['longtask'] });
} catch (_) {}

const sleep = (ms) => new Promise((r) => setTimeout(r, ms));

// Sample rAF frame intervals across a window; also bucket long-tasks into it.
function recordSwap(durationMs) {
  return new Promise((resolve) => {
    const start = performance.now();
    const ltStart = longTasks.length;
    const times = [];
    function frame(now) {
      times.push(now);
      if (now - start < durationMs) requestAnimationFrame(frame);
      else {
        const intervals = [];
        for (let i = 1; i < times.length; i++) intervals.push(times[i] - times[i-1]);
        const lt = longTasks.slice(ltStart);
        resolve({ intervals, longTaskCount: lt.length, longTaskMs: lt.reduce((s,e)=>s+e.duration,0),
                  maxLongTaskMs: lt.reduce((m,e)=>Math.max(m,e.duration),0) });
      }
    }
    requestAnimationFrame(frame);
  });
}

function agg(swaps) {
  const all = swaps.flatMap(s => s.intervals);
  all.sort((a,b)=>a-b);
  const p = (q) => all.length ? all[Math.min(all.length-1, Math.floor(q*all.length))] : 0;
  const sum = (f) => swaps.reduce((s,x)=>s+f(x),0);
  return {
    swaps: swaps.length,
    frames: all.length,
    meanFrameMs: +(all.reduce((s,x)=>s+x,0)/(all.length||1)).toFixed(2),
    p95FrameMs: +p(0.95).toFixed(2),
    maxFrameMs: +(all.length?all[all.length-1]:0).toFixed(2),
    jankFrames32: all.filter(x=>x>32).length,        // missed >=2 frames @60Hz
    jankFrames50: all.filter(x=>x>50).length,
    longTaskCount: sum(s=>s.longTaskCount),
    longTaskMsTotal: +sum(s=>s.longTaskMs).toFixed(1),
    maxLongTaskMs: +swaps.reduce((m,s)=>Math.max(m,s.maxLongTaskMs),0).toFixed(1),
  };
}

async function runMode(mode, { withDensity, swaps = 6 }) {
  grid.dataset.mode = mode;   // 'current' | 'paint' | 'paint-nsh' | 'paint-col'
  // reset to baseline theme/density
  grid.classList.remove('density-compact','density-comfortable');
  grid.classList.add('density-default');
  applyTheme(0, false);
  await sleep(250);
  const results = [];
  for (let i = 1; i <= swaps; i++) {
    grid.dataset.anim = '';                 // arm the transition (flag)
    applyTheme(i, withDensity);             // change theme in the same tick
    const r = await recordSwap(600);        // measure across the tween + buffer
    delete grid.dataset.anim;               // disarm
    results.push(r);
    await sleep(350);                        // idle gap between swaps
  }
  delete grid.dataset.mode;
  return agg(results.slice(1));              // drop warm-up swap
}

window.__run = async function () {
  const out = { nodeCount: NODE_COUNT, ua: navigator.userAgent, dpr: devicePixelRatio, modes: {} };
  out.modes.current             = await runMode('current',   { withDensity: true });   // PR #302
  out.modes.paintOnly_density   = await runMode('paint',     { withDensity: true });   // paint-only, density still snaps
  out.modes.paintOnly_constDens = await runMode('paint',     { withDensity: false });  // paint-only (color+radius+shadow)
  out.modes.paintNoShadow       = await runMode('paint-nsh', { withDensity: false });  // + drop shadow tween
  out.modes.colorOnly           = await runMode('paint-col', { withDensity: false });  // color crossfade only
  window.__RESULTS__ = out;
  return out;
};
window.__READY__ = true;
</script>
</body>
</html>
