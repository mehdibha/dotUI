# this workflow will run on every pr to make sure the project is following the guidelines

# after labeler, run other actions with strict permissions
name: CI

on:
  pull_request:
    branches: ["*"]
  merge_group:

jobs:
  check:
    runs-on: ubuntu-latest
    name: Run checks
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: ./.github/actions/setup

      - run: pnpm lint:ws

      - run: pnpm check

  tsc:
    runs-on: ubuntu-latest
    name: Run typecheck
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: ./.github/actions/setup

      - run: pnpm typecheck

  check-changeset:
    runs-on: ubuntu-latest
    name: Check Changeset
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: ./.github/actions/setup

      - name: Check and Validate Changes in tailwindcss-autocontrast
        run: |
          git fetch origin main:main
          changes=$(git diff --name-only main...${{ github.sha }} | grep '^packages/tailwindcss-autocontrast/' || true)
          if [[ -n "$changes" ]]; then
            echo "Changes detected in tailwindcss-autocontrast: $changes"
            pnpm changeset status --since origin/main
            exit_status=$?
            if [[ $exit_status -eq 0 ]]; then
              echo "Changeset validation succeeded."
            else
              echo "Changeset validation failed."
            fi
          else
            echo "No changes detected in tailwindcss-autocontrast"
          fi

  test:
    runs-on: ubuntu-latest
    name: Run tests
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: ./.github/actions/setup

      - run: pnpm test

  registry-drift:
    runs-on: ubuntu-latest
    name: Check generated registry artifacts are up to date
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: ./.github/actions/setup

      - name: Regenerate committed registry artifacts
        run: pnpm build:registry

      - name: Fail if any committed generated artifact is stale
        run: |
          git diff --exit-code -- \
            www/src/registry/__generated__/demos.tsx \
            www/src/registry/__generated__/icons.tsx \
            www/src/registry/__generated__/examples.tsx \
            www/src/registry/__generated__/base-css.ts \
            www/src/registry/__generated__/__tabler__.ts \
            www/src/registry/__generated__/__hugeicons__.ts \
            www/src/registry/__generated__/__remix__.ts \
          || { echo '::error::Committed generated registry artifacts are out of date. Run `pnpm build:registry` and commit the result.'; exit 1; }
