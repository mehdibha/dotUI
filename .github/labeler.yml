'area: www':
  - changed-files:
      - any-glob-to-any-file: ['www/**']

'documentation':
  - changed-files:
      - any-glob-to-any-file: ['www/content/**', '**/*.md', '**/*.mdx']

'area: ci':
  - changed-files:
      - any-glob-to-any-file: ['.github/**']

'area: registry':
  - changed-files:
      - any-glob-to-any-file: ['www/src/registry/**']

'area: colors':
  - changed-files:
      - any-glob-to-any-file: ['packages/colors/**']
